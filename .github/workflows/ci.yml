name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync environment
        run: uv sync --frozen --all-groups

      - name: Validate wiki
        run: uv run python scripts/validate_wiki.py --strict

      - name: Validate docs links
        run: uv run python scripts/validate_docs_links.py

      - name: Check generated taxonomy doc
        run: uv run python scripts/render_taxonomy_doc.py --check

      - name: Tests
        run: uv run pytest

      - name: MkDocs build (strict)
        run: uv run mkdocs build --strict
